<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolphin Training Portal</title>

  <!-- Google Fonts: Manrope + Hanken Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- Tailwind CSS via CDN with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              DEFAULT: '#fcf9f8',
              dim: '#dcd9d9',
              bright: '#fcf9f8',
              'container-lowest': '#ffffff',
              'container-low': '#f6f3f2',
              container: '#f0eded',
              'container-high': '#eae7e7',
              'container-highest': '#e5e2e1',
              variant: '#e5e2e1',
            },
            'on-surface': { DEFAULT: '#1c1b1b', variant: '#3d4947' },
            'inverse-surface': '#313030',
            'inverse-on-surface': '#f3f0ef',
            outline: { DEFAULT: '#6d7a77', variant: '#bcc9c6' },
            'surface-tint': '#006a61',
            primary: {
              DEFAULT: '#00685f',
              container: '#008378',
              fixed: '#89f5e7',
              'fixed-dim': '#6bd8cb',
            },
            'on-primary': {
              DEFAULT: '#ffffff',
              container: '#f4fffc',
              fixed: '#00201d',
              'fixed-variant': '#005049',
            },
            'inverse-primary': '#6bd8cb',
            secondary: { DEFAULT: '#316763', container: '#b5ede7' },
            'on-secondary': { DEFAULT: '#ffffff', container: '#376d69' },
            'secondary-fixed': { DEFAULT: '#b5ede7', dim: '#9ad1cb' },
            'on-secondary-fixed': { DEFAULT: '#00201e', variant: '#144f4b' },
            tertiary: { DEFAULT: '#525e5c', container: '#6b7775' },
            'on-tertiary': { DEFAULT: '#ffffff', container: '#f3fffc' },
            'tertiary-fixed': { DEFAULT: '#d8e5e2', dim: '#bcc9c6' },
            'on-tertiary-fixed': { DEFAULT: '#121e1c', variant: '#3d4947' },
            error: { DEFAULT: '#ba1a1a', container: '#ffdad6' },
            'on-error': { DEFAULT: '#ffffff', container: '#93000a' },
            'surface-taupe': '#F5F5F4',
            'success-emerald': '#16A34A',
            'error-ruby': '#DC2626',
            'accent-teal-soft': '#CCFBF1',
          },
          fontFamily: {
            headline: ['Manrope', 'sans-serif'],
            ui: ['Hanken Grotesk', 'sans-serif'],
          },
          fontSize: {
            'headline-lg': ['40px', { lineHeight: '1.2', letterSpacing: '-0.02em', fontWeight: '800' }],
            'headline-lg-mobile': ['30px', { lineHeight: '1.2', fontWeight: '800' }],
            'headline-md': ['24px', { lineHeight: '1.3', fontWeight: '700' }],
            'headline-sm': ['18px', { lineHeight: '1.4', fontWeight: '600' }],
            'body-lg': ['18px', { lineHeight: '1.6', fontWeight: '400' }],
            'body-md': ['16px', { lineHeight: '1.6', fontWeight: '400' }],
            'label-caps': ['12px', { lineHeight: '1', letterSpacing: '0.1em', fontWeight: '700' }],
            'label-sm': ['13px', { lineHeight: '1.4', fontWeight: '500' }],
          },
          borderRadius: {
            'sm': '0.25rem',
            DEFAULT: '0.5rem',
            'md': '0.75rem',
            'lg': '1rem',
            'xl': '1.5rem',
            '2xl': '1rem',
          },
          maxWidth: {
            'learning': '1100px',
            'reading': '720px',
          },
          spacing: {
            'section': '64px',
            'element': '24px',
          },
          boxShadow: {
            card: '0 4px 20px rgba(0, 0, 0, 0.04)',
            'card-hover': '0 8px 30px rgba(0, 0, 0, 0.06)',
            overlay: '0 12px 40px rgba(0, 0, 0, 0.08)',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-surface-taupe text-on-surface antialiased font-ui">
  <div id="app" class="min-h-screen"></div>
  <script type="module">
    import { boot } from './js/shell.js';
    boot();
  </script>
</body>
</html>
