name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/pr-quality-gate.yml
    secrets: inherit

  deploy-backend-staging:
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event.repository.fork == false
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      FACILITATOR_SECRET: ${{ secrets.FACILITATOR_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS_STAGING }}
      JWT_ALGORITHM: ${{ secrets.JWT_ALGORITHM }}
      JWT_EXPIRE_MINUTES: ${{ secrets.JWT_EXPIRE_MINUTES }}
    steps:
      - uses: actions/checkout@v4

      - name: Check backend exists
        id: detect
        run: |
          if [[ -f backend/requirements.txt ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "backend/requirements.txt not found; skipping backend deploy."
          fi

      - name: Configure SSH
        if: steps.detect.outputs.exists == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Bootstrap VPS directories
        if: steps.detect.outputs.exists == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << 'EOF'
            set -e
            id deploy >/dev/null 2>&1 || sudo useradd -r -s /bin/false deploy
            sudo mkdir -p /opt/dolphin-training/backend-staging
            sudo mkdir -p /opt/dolphin-training/data-staging
            sudo chown -R deploy:deploy /opt/dolphin-training
          EOF

      - name: Sync backend to VPS staging
        if: steps.detect.outputs.exists == 'true'
        run: |
          rsync -avz --delete \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            backend/ "${VPS_USER}@${VPS_HOST}:/opt/dolphin-training/backend-staging/"

      - name: Install dependencies and write env
        if: steps.detect.outputs.exists == 'true'
        run: |
          # Normalize sqlite:///path → sqlite:////path on the runner before writing .env,
          # so the app (uvicorn) also gets the correct absolute SQLite URL.
          _DB_URL="${DATABASE_URL}"
          if [[ "$_DB_URL" =~ ^sqlite:///[^/] ]]; then
            _DB_URL="sqlite:////${_DB_URL#sqlite:///}"
          fi
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << EOF
            set -e
            cd /opt/dolphin-training/backend-staging
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            {
              printf '%s\n' \
                "JWT_SECRET=${JWT_SECRET}" \
                "FACILITATOR_SECRET=${FACILITATOR_SECRET}" \
                "DATABASE_URL=${_DB_URL}" \
                "CORS_ORIGINS=${CORS_ORIGINS}" \
                "ENV=staging"
              [[ -n "${JWT_ALGORITHM}" ]] && printf 'JWT_ALGORITHM=%s\n' "${JWT_ALGORITHM}"
              [[ -n "${JWT_EXPIRE_MINUTES}" ]] && printf 'JWT_EXPIRE_MINUTES=%s\n' "${JWT_EXPIRE_MINUTES}"
            } > .env
            chmod 600 .env
          EOF

      - name: Migrate and restart service
        if: steps.detect.outputs.exists == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << 'REMOTE'
            set -e
            cd /opt/dolphin-training/backend-staging
            source venv/bin/activate

            set -a
            source .env
            set +a

            echo "--- diagnostics ---"
            echo "DATABASE_URL length: ${#DATABASE_URL}"
            echo "DATABASE_URL prefix: ${DATABASE_URL:0:15}"
            ls -la /opt/dolphin-training/ || true
            ls -la /opt/dolphin-training/data-staging/ || true
            echo "--- .env (redacted) ---"
            sed 's/=.*$/=***/' .env
            echo "--- end diagnostics ---"

            if [[ -z "${DATABASE_URL}" ]]; then
              echo "ERROR: DATABASE_URL is empty after sourcing .env."
              exit 1
            fi

            # Normalize sqlite:///path → sqlite:////path so SQLAlchemy treats it as absolute.
            # 3-slash URLs are interpreted as relative paths from CWD; 4-slash = absolute.
            if [[ "$DATABASE_URL" =~ ^sqlite:///[^/] ]]; then
              DATABASE_URL="sqlite:////${DATABASE_URL#sqlite:///}"
              echo "Normalized DATABASE_URL to 4-slash absolute: ${DATABASE_URL:0:30}..."
            fi

            DB_PATH="${DATABASE_URL#sqlite:////}"
            DB_DIR=$(dirname "/$DB_PATH")
            echo "Ensuring DB directory: $DB_DIR"
            sudo mkdir -p "$DB_DIR"
            sudo chown -R deploy:deploy "$DB_DIR"
            sudo chmod 775 "$DB_DIR"

            sudo DATABASE_URL="$DATABASE_URL" "$(pwd)/venv/bin/alembic" upgrade head
            sudo chown -R deploy:deploy "$DB_DIR"
            sudo systemctl restart dolphin-training-backend-staging
          REMOTE

      - name: Deploy frontend to VPS staging
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << 'BOOTSTRAP'
            set -e
            sudo mkdir -p /var/www/dolphin-staging/portal
            sudo chown -R "${USER}:${USER}" /var/www/dolphin-staging
          BOOTSTRAP

          rsync -avz --delete \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            portal/ "${VPS_USER}@${VPS_HOST}:/var/www/dolphin-staging/portal/"

          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            nginx/staging.conf "${VPS_USER}@${VPS_HOST}:/tmp/dolphin-nginx-staging.conf"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << 'NGINX'
            set -e
            # Obtain SSL cert on first deploy (certbot standalone needs port 80 free)
            if [ ! -f /etc/letsencrypt/live/staging.dolphin.iceflow.cloud/fullchain.pem ]; then
              echo "SSL cert not found — obtaining via certbot standalone..."
              sudo systemctl stop nginx || true
              sudo certbot certonly --standalone \
                -d staging.dolphin.iceflow.cloud \
                --non-interactive --agree-tos \
                --register-unsafely-without-email
              sudo systemctl start nginx || true
            fi
            sudo mv /tmp/dolphin-nginx-staging.conf /etc/nginx/sites-available/dolphin-staging
            sudo ln -sf /etc/nginx/sites-available/dolphin-staging /etc/nginx/sites-enabled/dolphin-staging
            sudo nginx -t
            sudo systemctl reload nginx
          NGINX

      - name: Health check
        if: steps.detect.outputs.exists == 'true' && env.STAGING_HEALTH_URL != ''
        env:
          STAGING_HEALTH_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          for i in {1..5}; do
            if curl -sf "$STAGING_HEALTH_URL"; then
              echo "Health check OK"
              exit 0
            fi
            echo "Attempt $i failed; retrying..."
            sleep 5
          done
          echo "Health check failed: $STAGING_HEALTH_URL"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
