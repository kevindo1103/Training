name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  quality-gate:
    uses: ./.github/workflows/pr-quality-gate.yml
    secrets: inherit

  deploy-backend-staging:
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event.repository.fork == false
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      FACILITATOR_SECRET: ${{ secrets.FACILITATOR_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS_STAGING }}
      JWT_ALGORITHM: ${{ secrets.JWT_ALGORITHM }}
      JWT_EXPIRE_MINUTES: ${{ secrets.JWT_EXPIRE_MINUTES }}
    steps:
      - uses: actions/checkout@v4

      - name: Check backend exists
        id: detect
        run: |
          if [[ -f backend/requirements.txt ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "backend/requirements.txt not found; skipping backend deploy."
          fi

      - name: Configure SSH
        if: steps.detect.outputs.exists == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Bootstrap VPS directories
        if: steps.detect.outputs.exists == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << 'EOF'
            set -e
            sudo mkdir -p /opt/dolphin-training/backend-staging
            sudo mkdir -p /opt/dolphin-training/data-staging
            sudo chown -R "${USER}:${USER}" /opt/dolphin-training
          EOF

      - name: Sync backend to VPS staging
        if: steps.detect.outputs.exists == 'true'
        run: |
          rsync -avz --delete \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            backend/ "${VPS_USER}@${VPS_HOST}:/opt/dolphin-training/backend-staging/"

      - name: Install dependencies and restart service
        if: steps.detect.outputs.exists == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" << EOF
            set -e
            cd /opt/dolphin-training/backend-staging
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            {
              printf '%s\n' \
                "JWT_SECRET=${JWT_SECRET}" \
                "FACILITATOR_SECRET=${FACILITATOR_SECRET}" \
                "DATABASE_URL=${DATABASE_URL}" \
                "CORS_ORIGINS=${CORS_ORIGINS}" \
                "ENV=staging"
              [[ -n "${JWT_ALGORITHM}" ]] && printf 'JWT_ALGORITHM=%s\n' "${JWT_ALGORITHM}"
              [[ -n "${JWT_EXPIRE_MINUTES}" ]] && printf 'JWT_EXPIRE_MINUTES=%s\n' "${JWT_EXPIRE_MINUTES}"
            } > .env
            chmod 600 .env

            alembic upgrade head
            sudo systemctl restart dolphin-training-backend-staging
          EOF

      - name: Health check
        if: steps.detect.outputs.exists == 'true' && env.STAGING_HEALTH_URL != ''
        env:
          STAGING_HEALTH_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          for i in {1..5}; do
            if curl -sf "$STAGING_HEALTH_URL"; then
              echo "Health check OK"
              exit 0
            fi
            echo "Attempt $i failed; retrying..."
            sleep 5
          done
          echo "Health check failed: $STAGING_HEALTH_URL"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
